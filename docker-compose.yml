services:
  db:
    image: mysql:8.0
    env_file:
      - ./.env.mysql
    ports:
      - "127.0.0.1:3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./portfolio_backend
    ports:
      - "3001:3001"
    env_file:
      - ./portfolio_backend/.env
    depends_on:
      - db


volumes:
  db_data:
